name: Build Android APK

# 触发条件：推送到 main 分支、提交 PR 到 main 分支，或手动点击运行
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch: # 允许你在 GitHub 页面手动触发构建

jobs:
  build:
    runs-on: ubuntu-latest # 在最新的 Ubuntu 虚拟机上运行

    steps:
    # 1. 拉取你的仓库代码
    - uses: actions/checkout@v4

    # 2. 配置 Java 环境 (Android 构建必需)
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    # 3. 安装 Android SDK 和构建工具
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    # 4. 赋予 gradlew 执行权限并执行 Debug 版本打包
    - name: Build Debug APK
      run: |
        chmod +x ./gradlew
        ./gradlew assembleDebug

    # 5. 上传生成的 APK 文件，方便你直接下载
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug-apk
        path: app/build/outputs/apk/debug/app-debug.apk
